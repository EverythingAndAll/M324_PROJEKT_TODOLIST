stages:
  - build
  - docker

# Workflow: Nur bei Merge Requests auf den main Branch auslösen (Äquivalent zu GitHub actions "on: pull_request")
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == 'main'

build-frontend:
  stage: build
  image: node:20
  script:
    - cd frontend
    - npm install
    - npm run build
  artifacts:
    name: "frontend-build"
    paths:
      - frontend/dist/
    expire_in: 1 day

build-backend:
  stage: build
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - cd backend
    - mvn clean package
  artifacts:
    name: "backend-build"
    paths:
      - backend/target/*.jar
    expire_in: 1 day

# ======= NEU: DOCKER STAGE =======
docker-frontend:
  stage: docker
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  dependencies:
    - build-frontend
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_JOB_TOKEN $CI_REGISTRY
  script:
    - cd frontend
    - docker build -t $CI_REGISTRY_IMAGE/frontend:latest .
    - docker push $CI_REGISTRY_IMAGE/frontend:latest

docker-backend:
  stage: docker
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  dependencies:
    - build-backend
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_JOB_TOKEN $CI_REGISTRY
  script:
    - cd backend
    - docker build -t $CI_REGISTRY_IMAGE/backend:latest .
    - docker push $CI_REGISTRY_IMAGE/backend:latest
