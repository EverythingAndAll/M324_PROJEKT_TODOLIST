stages:
  - build

# Workflow: Nur bei Merge Requests auf den main Branch auslösen (Äquivalent zu GitHub actions "on: pull_request")
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == 'main'

build-frontend:
  stage: build
  image: node:20
  script:
    - cd frontend
    - npm install
    - npm run build
  artifacts:
    name: "frontend-build"
    paths:
      - frontend/dist/
    expire_in: 1 day

build-backend:
  stage: build
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - cd backend
    - mvn clean package
  artifacts:
    name: "backend-build"
    paths:
      - backend/target/*.jar
    expire_in: 1 day
